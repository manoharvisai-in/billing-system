name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test Server ──────────────────────────────────────────────────────
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: cd server && npm ci

      - name: Run server lint
        run: cd server && npx eslint . --ext .js --ignore-path .gitignore || true

      - name: Health check server startup
        run: |
          cd server
          cp .env.example .env
          echo "MONGODB_URI=mongodb://localhost:27017/billing_test" >> .env
          echo "JWT_SECRET=test_secret_ci" >> .env
          timeout 10 node index.js &
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          pkill -f "node index.js" || true

  # ── Build Client ────────────────────────────────────────────────────────────
  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: [server-test, client-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/swiftbill-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/swiftbill-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (example: SSH to VPS) ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/swiftbill
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployed SwiftBill to production"
