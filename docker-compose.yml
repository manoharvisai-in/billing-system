version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: billing_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: billing_system
    networks:
      - billing_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: billing_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/billing_system
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
    depends_on:
      - mongodb
    networks:
      - billing_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: billing_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - billing_net

volumes:
  mongo_data:

networks:
  billing_net:
    driver: bridge
